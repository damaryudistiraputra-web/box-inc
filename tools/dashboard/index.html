<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Inc. Economy Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --bg-color: #0f172a;
        --card-bg: #1e293b;
        --text-color: #f8fafc;
        --text-muted: #94a3b8;
        --primary: #3b82f6;
        --accent: #10b981;
        --danger: #ef4444;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 2rem;
      }
      h1 { margin-bottom: 2rem; font-weight: 800; font-size: 2.5rem; letter-spacing: -0.025em; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 1.5rem;
      }
      .card {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 1.5rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }
      .card h2 { font-size: 1.25rem; margin-top: 0; border-bottom: 1px solid #334155; padding-bottom: 0.5rem; color: var(--text-muted); }
      .metric {
        font-size: 2.5rem;
        font-weight: 600;
        margin: 1rem 0;
        color: var(--accent);
      }
      .chart-container {
        position: relative;
        height: 250px;
        width: 100%;
      }
      .comparison-table {
        width: 100%;
        border-collapse: collapse;
      }
      .comparison-table th, .comparison-table td {
        text-align: left;
        padding: 0.75rem;
        border-bottom: 1px solid #334155;
      }
      .comparison-table th { color: var(--text-muted); }
    </style>
  </head>
  <body>
    <h1>Box Inc. LiveOps Dashboard</h1>
    
    <div class="grid" id="app">
      <!-- Cards will be populated by main.ts -->
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
